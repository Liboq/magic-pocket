name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Magic Pocket ${{ github.ref_name }}
          releaseBody: |
            Magic Pocket 桌面版发布。

            包含内容：
            - Windows 安装包
            - 剪贴板历史、搜索、收藏、文本/图片/文件支持
            - 紧凑小窗 UI 与全局快捷键唤起
          releaseDraft: false
          prerelease: false
